name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  checks:
    name: Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-15-intel]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Run cargo check --manifest-path src-tauri/Cargo.toml
        if: runner.os != 'macOS'
        run: cargo check --manifest-path src-tauri/Cargo.toml
      - name: Run cargo check --manifest-path src-tauri/Cargo.toml
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set +e
          cargo check --manifest-path src-tauri/Cargo.toml > cargo-check.log 2>&1
          status=$?
          cat cargo-check.log
          if [ "$status" -ne 0 ]; then
            python3 - <<'PY'
          from pathlib import Path

          text = Path("cargo-check.log").read_text(errors="replace")
          tail = "\n".join(text.splitlines()[-80:])
          escaped = tail.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=macOS cargo check failed::{escaped}")
          PY
            exit "$status"
          fi
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  release:
    name: Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: checks
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-15-intel]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci
      - name: Build Windows NSIS bundle
        if: runner.os == 'Windows'
        run: npm run tauri:build:windows

      - name: Build Linux DEB bundle
        if: runner.os == 'Linux'
        run: npm run tauri:build:linux

      - name: Build macOS DMG bundle
        if: runner.os == 'macOS'
        run: npm run tauri:build:macos

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/**/*.{deb,dmg,msi,exe,zip}
